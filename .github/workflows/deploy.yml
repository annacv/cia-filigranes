name: Deploy to FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate Nuxt static site
        run: npm run generate
        env:
          NUXT_PUBLIC_GOOGLE_CALENDAR_API_KEY: ${{ secrets.NUXT_PUBLIC_GOOGLE_CALENDAR_API_KEY }}
          NUXT_PUBLIC_GOOGLE_CALENDAR_ID: ${{ secrets.NUXT_PUBLIC_GOOGLE_CALENDAR_ID }}
          NUXT_PUBLIC_STATIC_FORMS_API_URL: ${{ secrets.NUXT_PUBLIC_STATIC_FORMS_API_URL }}
          NUXT_PUBLIC_STATIC_FORMS_ACCESS_KEY: ${{ secrets.NUXT_PUBLIC_STATIC_FORMS_ACCESS_KEY }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}        # domain
          username: ${{ secrets.FTP_USERNAME }}    # FTP user
          password: ${{ secrets.FTP_PASSWORD }}    # FTP password
          protocol: ftp                            # or FTPS if available
          local-dir: ./dist/                       # Nuxt static output
          server-dir: ./html/                      # web root
          dangerous-clean-slate: true              # wipes remote dir before upload
